<style>
:root{--bg-root:#060A11;--bg-shell:#090E18;--bg-surface:#0C1421;--bg-card:#101D30;--bg-elevated:#152438;--bdr:#1C2E47;--bdr-hi:#1E3D5C;--pri:#0A84FF;--tl:#00C7BE;--amb:#FF9F0A;--rd:#FF3B30;--grn:#32D74B;--pur:#BF5AF2;--ind:#5E5CE6;--t-pri:#F5F5F7;--t-sec:#8E8E93;--t-mut:#48484A;--t-code:#64D2FF}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:system-ui,-apple-system,'SF Pro Display',sans-serif;background:var(--bg-root);color:var(--t-pri);overflow:hidden;height:100vh}
.mono{font-family:'JetBrains Mono','SF Mono','Fira Code',monospace}
.code-block{background:var(--bg-root);border:1px solid var(--bdr);border-radius:12px;padding:16px;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;font-size:13px;line-height:1.7;overflow-x:auto;position:relative;tab-size:2}
.code-block .kw{color:#0A84FF}.code-block .tp{color:#00C7BE}.code-block .str{color:#FF9F0A}.code-block .cm{color:#48484A}.code-block .fn{color:#BF5AF2}.code-block .num{color:#32D74B}

.code-copy:hover{background:rgba(10,132,255,.15);color:var(--pri)}
.nav-item{height:36px;display:flex;align-items:center;gap:8px;padding:0 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--t-sec);transition:all .15s;border-left:2px solid transparent;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.04)}
.nav-item.active{background:rgba(10,132,255,.12);color:var(--pri);border-left-color:var(--pri)}
.nav-item.active i{color:var(--pri)}
.nav-group-hdr{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--t-mut);padding:16px 12px 6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.nav-group-hdr:hover{color:var(--t-sec)}
.panel{display:none;animation:panelIn .3s ease}
.panel.active{display:block}
@keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600;line-height:1.4}
.badge-green{background:rgba(50,215,75,.12);color:#32D74B}
.badge-amber{background:rgba(255,159,10,.12);color:#FF9F0A}
.badge-blue{background:rgba(10,132,255,.12);color:#0A84FF}
.badge-purple{background:rgba(191,90,242,.12);color:#BF5AF2}
.badge-red{background:rgba(255,59,48,.12);color:#FF3B30}
.badge-grey{background:rgba(142,142,147,.12);color:#8E8E93}
.badge-teal{background:rgba(0,199,190,.12);color:#00C7BE}
.layer-band{border-left:3px solid;padding:12px 16px;border-radius:8px;background:var(--bg-card);cursor:pointer;transition:all .2s}
.layer-band:hover{filter:brightness(1.15)}
.intent-card{background:var(--bg-card);border:1px solid var(--bdr);border-radius:12px;padding:16px;transition:all .2s}
.intent-card:hover{border-color:var(--bdr-hi)}
.contract-card{background:var(--bg-card);border:1px solid var(--bdr);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s}
.contract-card:hover{border-color:var(--pri);transform:translateY(-2px)}
.drawer{position:fixed;top:0;right:-500px;width:480px;max-width:90vw;height:100vh;background:var(--bg-root);border-left:1px solid var(--bdr);z-index:100;transition:right .3s ease;overflow-y:auto;padding:24px}
.drawer.open{right:0}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
.drawer-overlay.open{display:block}
.status-pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.matrix-cell{width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px;cursor:default;position:relative}
.matrix-cell .tooltip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--bg-elevated);border:1px solid var(--bdr);border-radius:6px;padding:6px 10px;font-size:11px;white-space:nowrap;z-index:10;margin-bottom:4px}
.matrix-cell:hover .tooltip{display:block}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--bdr);border-radius:8px;max-height:320px;overflow-y:auto;z-index:60;display:none}
.search-results.show{display:block}
.search-result-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(28,46,71,.5)}
.search-result-item:hover{background:rgba(10,132,255,.08)}
.schema-block{max-height:0;overflow:hidden;transition:max-height .4s ease}
.schema-block.expanded{max-height:600px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--bg-root);flex-shrink:0}
.progress-fill{transition:width 1.2s ease}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--bdr-hi)}
.sidebar-collapsed .sidebar-text{display:none}
.sidebar-collapsed .nav-group-hdr span{display:none}
.sidebar-collapsed .nav-group-hdr .badge{display:none}
@media(max-width:1023px){#sidebar{width:48px!important}#sidebar .sidebar-text,.nav-group-hdr span,.nav-group-hdr .badge,.sidebar-label{display:none!important}#main-content{margin-left:48px!important}}
@media(max-width:767px){#sidebar{display:none!important}#main-content{margin-left:0!important}#mobile-menu-btn-x3k9{display:flex!important}.drawer{width:100%!important}}
.tab-btn{padding:6px 16px;border-radius:6px;font-size:13px;cursor:pointer;transition:all .15s;color:var(--t-sec);background:transparent;border:none}
.tab-btn.active{background:rgba(10,132,255,.15);color:var(--pri)}
</style>

function buildNav(containerId, isMobile){
  const c = document.getElementById(containerId);
  if(!c) return;
  c.innerHTML = '';
  NAV_STRUCTURE.forEach(group => {
    const isExpanded = state.expandedGroups.has(group.group);
    const hdr = document.createElement('div');
    hdr.className = 'nav-group-hdr';
    hdr.innerHTML = `<span>${group.group}</span>${group.badge?`<span class="badge badge-blue">${group.badge}</span>`:''}<i data-lucide="${isExpanded?'chevron-down':'chevron-right'}" class="w-3 h-3 text-t-mut"></i>`;
    hdr.addEventListener('click', ()=>{
      if(state.expandedGroups.has(group.group)) state.expandedGroups.delete(group.group);
      else state.expandedGroups.add(group.group);
      buildNav('sidebar-nav-s1n2', false);
      buildNav('mobile-nav-items-m1n2', true);
    });
    c.appendChild(hdr);
    if(isExpanded){
      group.items.forEach(item => {
        const el = document.createElement('div');
        el.className = `nav-item ${state.currentPanel===item.id?'active':''}`;
        el.setAttribute('tabindex','0');
        el.setAttribute('data-panel', item.id);
        el.innerHTML = `<i data-lucide="${item.icon}" class="w-4 h-4 flex-shrink-0"></i><span class="sidebar-text truncate">${item.label}</span>${item.badge?`<span class="badge badge-grey ml-auto sidebar-text">${item.badge}</span>`:''}`;
        el.addEventListener('click', ()=> navigateTo(item.id));
        el.addEventListener('keydown', e=>{ if(e.key==='Enter') navigateTo(item.id); });
        c.appendChild(el);
      });
    }
  });
  if(typeof lucide!=='undefined'&&typeof lucide.createIcons==='function') lucide.createIcons();
}

function navigateTo(panelId){
  state.currentPanel = panelId;
  // For contract items, route to contracts hub
  const contractIds = ['contract-envelope','contract-evidence','contract-escalation','contract-sync','contract-handoff','contract-router','contract-reg','contract-auth'];
  if(contractIds.includes(panelId)){
    state.currentPanel = 'contracts';
    renderPanels();
    buildNav('sidebar-nav-s1n2', false);
    buildNav('mobile-nav-items-m1n2', true);
    history.pushState(null,'','#contracts');
    // Open drawer for specific contract
    const cid = panelId.replace('contract-','');
    setTimeout(()=> openDrawer(cid), 400);
    closeMobileNav();
    return;
  }
  // Sprint items route to roadmap
  if(['sprint-1','sprint-2-3','sprint-4-6'].includes(panelId)){
    state.currentPanel = 'roadmap';
    panelId = 'roadmap';
  }
  // decisions/open-questions route to review-board
  if(['decisions','open-questions'].includes(panelId)){
    state.currentPanel = 'review-board';
    panelId = 'review-board';
  }
  // component-map, project-status, team-roles -> dashboard
  if(['component-map','project-status','team-roles'].includes(panelId)){
    state.currentPanel = panelId;
  }
  renderPanels();
  buildNav('sidebar-nav-s1n2', false);
  buildNav('mobile-nav-items-m1n2', true);
  history.pushState(null,'','#'+state.currentPanel);
  document.getElementById('main-content').scrollTop = 0;
  closeMobileNav();
}

function closeMobileNav(){
  const mn = document.getElementById('mobile-nav-m1n2');
  if(mn) mn.classList.add('hidden');
}

// A2UI
function renderA2UI(){
  const steps = ['Agent receives intent','Agent resolves componentId from catalog','Server checks Authorization Matrix','Auth gate: role × componentId × trust level','COMPONENT_RENDER event emitted via SSE','Client-side renderer mounts trusted component','User interacts → ACTION event returned','TOOL_RESULT committed to state'];
  return `
  <div class="flex flex-col md:flex-row md:items-end justify-between mb-6">
    <div><h1 class="text-2xl md:text-3xl font-bold mb-1">A2UI Workspace Layer</h1><p class="text-t-sec text-sm">Agent-proposed UI · Deterministic renderer · Authorization gate</p></div>
    <div class="flex items-center gap-2 mt-3 md:mt-0"><span class="badge badge-grey text-xs">Updated 19 Jul 2026</span></div>
  </div>
  <!-- Render Pipeline -->
  <div class="bg-card border border-bdr rounded-xl p-5 mb-6">
    <h3 class="font-semibold mb-4 flex items-center gap-2"><i data-lucide="workflow" class="w-5 h-5 text-tl"></i>A2UI Render Pipeline</h3>
    <div class="space-y-2">
      ${steps.map((s,i)=>`<div class="flex gap-3 items-start"><div class="w-7 h-7 rounded-full bg-elevated flex items-center justify-center text-xs mono text-pri flex-shrink-0">${i+1}</div><div class="bg-elevated rounded-lg px-4 py-2.5 text-sm text-t-sec flex-1">${s}</div></div>`).join('')}
    </div>
  </div>
  <!-- Auth Gate Code -->
  <div class="bg-card border border-bdr rounded-xl p-5 mb-6">
    <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="shield" class="w-4 h-4 text-amb"></i>Authorization Gate</h3>
    <div class="code-block text-xs"><button class="code-copy copy-code-btn">Copy</button><span class="kw">async function</span> <span class="fn">authorizeComponentRender</span>(
  <span class="tp">event</span>: <span class="tp">ComponentRenderEvent</span>,
  <span class="tp">token</span>: <span class="tp">AIMSAuthToken</span>
): <span class="tp">Promise</span>&lt;<span class="tp">boolean</span>&gt; {
  <span class="cm">// 1. Verify JWT signature and expiration</span>
  <span class="kw">const</span> claims = <span class="kw">await</span> <span class="fn">verifyJWT</span>(token);

  <span class="cm">// 2. Check role matches thread role</span>
  <span class="kw">if</span> (claims.role !== event.threadRole) <span class="kw">return false</span>;

  <span class="cm">// 3. Check componentId is in permitted list for trust level</span>
  <span class="kw">const</span> requiredTrust = <span class="fn">getCatalogTrust</span>(event.componentId);
  <span class="kw">const</span> permitted = claims.permissions[requiredTrust];
  <span class="kw">if</span> (!permitted?.includes(event.componentId)) <span class="kw">return false</span>;

  <span class="cm">// 4. OVERRIDE actions require MFA verification</span>
  <span class="kw">if</span> (requiredTrust === <span class="str">'override'</span> && !claims.mfaVerified) <span class="kw">return false</span>;

  <span class="cm">// 5. Log to audit trail</span>
  <span class="kw">await</span> <span class="fn">auditLog</span>({ userId: claims.sub, componentId: event.componentId, action: <span class="str">'RENDER'</span> });

  <span class="kw">return true</span>;
}</div>
  </div>
  <!-- Key Principle -->
  <div class="bg-card border-l-4 border-amb rounded-xl p-5">
    <div class="flex items-center gap-2 mb-2"><i data-lucide="alert-triangle" class="w-4 h-4 text-amb"></i><h3 class="font-semibold text-sm">Key Principle</h3></div>
    <p class="text-sm text-t-sec">The agent cannot render arbitrary HTML. It can only reference <span class="mono text-t-code">componentId</span>s from the trusted catalog. All rendering is deterministic and server-authorized.</p>
  </div>`;
}

// AUTH MATRIX
function renderAuthMatrix(){
  const roles = ['Planner','Reviewer','Supervisor','Inspector/Gemma'];
  const perms = ['READ','CONFIRM','ACTION','SIGN','OVERRIDE','ESCALATE'];
  const matrix = {
    'Planner':     ['✅','✅','✅','—','—','—'],
    'Reviewer':    ['✅','✅','✅','✅','—','—'],
    'Supervisor':  ['✅','✅','✅','✅','✅','—'],
    'Inspector/Gemma':['✅','✅','〜','—','—','✅'],
  };
  const cellColors = {'✅':'bg-grn/10 text-grn','〜':'bg-amb/10 text-amb','—':'bg-card text-t-mut'};
  const tips = {'✅':'Granted','〜':'Conditional (offline only)','—':'Not permitted'};
  return `
  <div class="flex flex-col md:flex-row md:items-end justify-between mb-6">
    <div><h1 class="text-2xl md:text-3xl font-bold mb-1">Authorization Matrix</h1><p class="text-t-sec text-sm">Role × Component × Action — enforced server-side before every COMPONENT_RENDER event</p></div>
    <div class="flex items-center gap-2 mt-3 md:mt-0"><span class="badge badge-grey text-xs">Updated 19 Jul 2026</span></div>
  </div>
  <div class="bg-card border border-bdr rounded-xl p-5 mb-6">
    <h3 class="font-semibold mb-4">Permission Matrix</h3>
    <div class="overflow-x-auto">
      <table class="text-sm">
        <thead><tr><th class="pb-3 pr-6 text-left text-t-mut font-medium text-xs">Role</th>${perms.map(p=>`<th class="pb-3 px-3 text-center text-t-mut font-medium text-xs">${p}</th>`).join('')}</tr></thead>
        <tbody>${roles.map(r=>`<tr class="border-t border-bdr/50"><td class="py-3 pr-6 mono text-sm text-t-pri">${r}</td>${matrix[r].map(v=>`<td class="py-3 px-3 text-center"><div class="matrix-cell mx-auto ${cellColors[v]} rounded-lg">${v}<div class="tooltip text-t-pri">${tips[v]}</div></div></td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="bg-card border border-bdr rounded-xl p-5">
      <h3 class="font-semibold text-sm mb-3">Trust Level Definitions</h3>
      <div class="space-y-2 text-xs text-t-sec">
        <div><span class="badge badge-grey mr-2">1 READ</span> View-only, no mutations</div>
        <div><span class="badge badge-blue mr-2">2 CONFIRM</span> Acknowledge, no data change</div>
        <div><span class="badge badge-amber mr-2">3 ACTION</span> Executes a state mutation</div>
        <div><span class="badge badge-teal mr-2">4 SIGN</span> Cryptographic signature, audit-logged</div>
        <div><span class="badge badge-red mr-2">5 OVERRIDE</span> Overrules prior decision, MFA required</div>
      </div>
    </div>
    <div class="bg-card border border-bdr rounded-xl p-5">
      <h3 class="font-semibold text-sm mb-3">Condition Footnotes</h3>
      <div class="space-y-2 text-xs text-t-sec">
        <div>• Inspector ACTION is conditional: <span class="mono text-t-code">offline-only</span> scope, queued for sync</div>
        <div>• Supervisor OVERRIDE requires MFA re-authentication (TOTP or WebAuthn)</div>
        <div>• ESCALATE is exclusive to Inspector/Gemma edge agents</div>
        <div>• All permissions are enforced server-side — client cannot bypass the auth gate</div>
      </div>
    </div>
  </div>`;
}

// EVENTS
// ============================================================
function attachPanelEvents(){
  // Nav cards
  document.querySelectorAll('.nav-card').forEach(el=>{
    el.addEventListener('click', ()=>{
      const target = el.dataset.target;
      if(target) navigateTo(target);
    });
  });

  // Copy link
  document.querySelectorAll('.copy-link-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const link = location.origin + location.pathname + (btn.dataset.link||'');
      navigator.clipboard.writeText(link).then(()=>{
        btn.innerHTML='<i data-lucide="check" class="w-4 h-4 text-grn"></i>';
        if(typeof lucide!=='undefined'&&typeof lucide.createIcons==='function') lucide.createIcons();
        setTimeout(()=>{btn.innerHTML='<i data-lucide="link" class="w-4 h-4"></i>';if(typeof lucide!=='undefined'&&typeof lucide.createIcons==='function') lucide.createIcons();},1500);
      });
    });
  });

  // Copy code
  document.querySelectorAll('.copy-code-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const block = btn.parentElement;
      const text = block.innerText.replace('Copy','').trim();
      navigator.clipboard.writeText(text).then(()=>{
        btn.textContent='Copied!';
        setTimeout(()=>{btn.textContent='Copy';},1500);
      });
    });
  });

  // Schema toggles
  document.querySelectorAll('.schema-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.intent;
      const el = document.getElementById('schema-'+id);
      if(el){
        el.classList.toggle('expanded');
        btn.textContent = el.classList.contains('expanded') ? 'Hide Schema' : 'Show Schema';
      }
    });
  });

  // Contract drawer
  document.querySelectorAll('.open-drawer-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> openDrawer(btn.dataset.contract));
  });

  // Comment post
  const postBtn = document.getElementById('post-comment-btn-pc1');
  if(postBtn){
    postBtn.addEventListener('click', ()=>{
      const text = document.getElementById('new-comment-text-nc1').value.trim();
      const section = document.getElementById('new-comment-section-nc2').value;
      if(!text) return;
      state.comments.unshift({ id:'c'+Date.now(), author:'Nalin R.', time:'Just now', section, text, color:'#0A84FF' });
      saveState();
      renderPanels();
    });
  }

  // Decision add
  const addDecBtn = document.getElementById('add-decision-btn-ad1');
  if(addDecBtn){
    addDecBtn.addEventListener('click', ()=>{
      const text = document.getElementById('new-decision-text-nd1').value.trim();
      const by = document.getElementById('new-decision-by-nd2').value.trim()||'Nalin R.';
      if(!text) return;
      state.decisions.unshift({ id:'d'+Date.now(), date:'19 Jul', text, by:'Approved: '+by });
      saveState();
      renderPanels();
    });
  }

  // Question add
  const addQBtn = document.getElementById('add-question-btn-aq1');
  if(addQBtn){
    addQBtn.addEventListener('click', ()=>{
      const text = document.getElementById('new-question-text-nq1').value.trim();
      const author = document.getElementById('new-question-author-nq2').value.trim()||'@Nalin R.';
      if(!text) return;
      state.questions.unshift({ id:'q'+Date.now(), text, author, resolved:false });
      saveState();
      renderPanels();
    });
  }

  // Resolve question
  document.querySelectorAll('.resolve-q-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const qid = btn.dataset.qid;
      const q = state.questions.find(x=>x.id===qid);
      if(q){ q.resolved = !q.resolved; saveState(); renderPanels(); }
    });
  });

  // Stat counters animation
  document.querySelectorAll('.stat-counter').forEach(el=>{
    const target = parseInt(el.dataset.target);
    let current = 0;
    const step = Math.ceil(target / 30);
    const interval = setInterval(()=>{
      current += step;
      if(current >= target){ current = target; clearInterval(interval); }
      el.textContent = current;
    }, 30);
  });

  // Progress bar animation
  document.querySelectorAll('.progress-fill').forEach(el=>{
    setTimeout(()=>{el.style.width = el.dataset.width;}, 100);
  });
}

// SEARCH
const ALL_SEARCHABLE = [];
function buildSearchIndex(){
  NAV_STRUCTURE.forEach(g=>{
    g.items.forEach(item=>{
      ALL_SEARCHABLE.push({ label:item.label, panelId:item.id, type:'Navigation' });
    });
  });
  Object.values(INTENTS).flat().forEach(i=>{
    ALL_SEARCHABLE.push({ label:i.name, panelId:i.id.includes('planner')?'planner-intents':i.id.includes('reviewer')||i.id.startsWith('load_evidence')||i.id.startsWith('open_evidence')||i.id.startsWith('approve_evidence')||i.id.startsWith('flag_')||i.id.startsWith('request_field')||i.id.startsWith('verify_hash')||i.id.startsWith('defect_analytics')?'reviewer-intents':i.id.includes('supervisor')||i.id.includes('fleet')||i.id.includes('agent_health')||i.id.includes('compliance')||i.id.includes('kpi')||i.id.includes('regulatory_submission')?'supervisor-intents':'inspector-intents', type:'Intent' });
  });
  CONTRACTS.forEach(c=>{
    ALL_SEARCHABLE.push({ label:c.name, panelId:'contract-'+c.id, type:'Contract' });
  });
  COMPONENTS.forEach(c=>{
    ALL_SEARCHABLE.push({ label:c.id+' — '+c.name, panelId:'renderer-catalog', type:'Component' });
  });
}

function handleSearch(query){
  const results = document.getElementById('search-results-s1a2');
  if(!query.trim()){ results.classList.remove('show'); return; }
  const q = query.toLowerCase();
  const matches = ALL_SEARCHABLE.filter(item=>item.label.toLowerCase().includes(q)).slice(0,10);
  if(!matches.length){ results.innerHTML='<div class="p-3 text-xs text-t-mut">No results found</div>'; results.classList.add('show'); return; }
  results.innerHTML = matches.map(m=>`<div class="search-result-item" data-panel="${m.panelId}"><span class="badge badge-grey mr-2 text-xs">${m.type}</span><span class="text-sm">${m.label}</span></div>`).join('');
  results.classList.add('show');
  results.querySelectorAll('.search-result-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      navigateTo(el.dataset.panel);
      results.classList.remove('show');
      document.getElementById('search-input-s1a2').value='';
    });
  });
}

// ============================================================
// INIT
// ============================================================
function init(){
  buildSearchIndex();

  // Hash routing
  const hash = location.hash.replace('#','');
  if(hash){
    // Map hash to valid panel
    const validPanels = new Set();
    NAV_STRUCTURE.forEach(g=>g.items.forEach(i=>validPanels.add(i.id)));
    ['contracts','roadmap','deliverables','review-board','project-status','team-roles','component-map'].forEach(p=>validPanels.add(p));
    if(validPanels.has(hash)) state.currentPanel = hash;
  }

  buildNav('sidebar-nav-s1n2', false);
  buildNav('mobile-nav-items-m1n2', true);
  renderPanels();

  // Search
  document.getElementById('search-input-s1a2').addEventListener('input', e=> handleSearch(e.target.value));
  document.addEventListener('click', e=>{
    if(!e.target.closest('#search-input-s1a2')&&!e.target.closest('#search-results-s1a2')){
      document.getElementById('search-results-s1a2').classList.remove('show');
    }
  });

  // Drawer
  document.getElementById('drawer-close-d1c2').addEventListener('click', closeDrawer);
  document.getElementById('drawer-overlay-d1o2').addEventListener('click', closeDrawer);
  document.getElementById('drawer-copy-all-d1a2').addEventListener('click', ()=>{
    const text = document.getElementById('drawer-content-d1c3').innerText;
    navigator.clipboard.writeText(text).then(()=>{
      document.getElementById('drawer-copy-all-d1a2').textContent='Copied!';
      setTimeout(()=>{document.getElementById('drawer-copy-all-d1a2').textContent='Copy all';},1500);
    });
  });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDrawer(); });

  // Mobile nav
  document.getElementById('mobile-menu-btn-x3k9').addEventListener('click', ()=>{
    document.getElementById('mobile-nav-m1n2').classList.remove('hidden');
  });
  document.getElementById('mobile-nav-close-m1n2').addEventListener('click', closeMobileNav);

  // popstate
  window.addEventListener('popstate', ()=>{
    const hash = location.hash.replace('#','');
    if(hash && hash !== state.currentPanel){
      state.currentPanel = hash;
      renderPanels();
      buildNav('sidebar-nav-s1n2', false);
    }
  });
}

// Icons + Init
if(typeof lucide!=='undefined'&&typeof lucide.createIcons==='function'){
  lucide.createIcons();
}
init();
</script>
